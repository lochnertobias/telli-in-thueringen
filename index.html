<!DOCTYPE html>
<html lang="de" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>telli in Thüringen</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SVG Icons ---
        const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const ChevronDownIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ChevronUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const TagIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
        const BookOpenIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const LayersIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>;
        const ZapIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const InfoIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const HelpIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const CloseIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ImageIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const SunIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const MoonIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const EditIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const ArrowUpIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>;
        const StarIcon = ({className, filled}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const PrinterIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
        const LinkIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
        const QrCodeIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line><line x1="15" y1="15" x2="15.01" y2="15"></line><line x1="9" y1="15" x2="9.01" y2="15"></line></svg>;

        // Statische Filter-Optionen
        const FILTER_STUFE = ['Primarstufe', 'Sekundarstufe 1', 'Sekundarstufe 2'];
        const FILTER_FUNKTION = ['Prompt', 'Bildgenerierung', 'Assistent', 'Lernszenarium', 'Dialogpartner'];
        const FILTER_TAGS = ['Thüringen'];

        // Fallback-Daten
        const FALLBACK_DATA = [
          {
            "id": "1",
            "titel": "Differenzierte Lesetexte generieren",
            "fach": "Deutsch",
            "funktion": "Prompt",
            "stufe": "Primarstufe",
            "kurzbeschreibung": "Sachtext in drei Niveaustufen für eine 2. Klasse generieren lassen. (FALLBACK DATEN)",
            "prompt": "Schreibe einen kurzen Sachtext über Igel im Winter für eine 2. Klasse. Maximal 60 Wörter, nur einfache Hauptsätze, Silbentrennung durch Bindestriche markieren. Erstelle denselben Text in einer Version für leseschwache Kinder (40 Wörter, Druckschrift-Stil) und einer Version für lesestarke Kinder (80 Wörter, mit einem Nebensatz pro Absatz)."
          }
        ];

        function App() {
          const [entries, setEntries] = useState([]);
          const [loading, setLoading] = useState(true);
          const [expandedCards, setExpandedCards] = useState(new Set());
          const [fileError, setFileError] = useState(false);
          const [showImpressum, setShowImpressum] = useState(false);
          const [showHelp, setShowHelp] = useState(false);
          const [qrModal, setQrModal] = useState({ isOpen: false, url: '', titel: '' });
          
          const [animatedCount, setAnimatedCount] = useState(0);
          const [showScrollTop, setShowScrollTop] = useState(false);
          const scrollContainerRef = useRef(null);
          const [faecherListe, setFaecherListe] = useState([]);
          
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [showEditorMode, setShowEditorMode] = useState(false);
          const [showFilters, setShowFilters] = useState(window.innerWidth >= 768);

          const [favorites, setFavorites] = useState(() => {
            const savedFavorites = localStorage.getItem('telli_favorites');
            return savedFavorites ? JSON.parse(savedFavorites) : [];
          });
          const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);

          const [filters, setFilters] = useState({
            fach: [],
            stufe: [],
            funktion: [],
            tags: []
          });
          const [searchTerm, setSearchTerm] = useState('');

          const headerClickCountRef = useRef(0);
          const headerClickTimeoutRef = useRef(null);

          const handleHeaderClick = () => {
            headerClickCountRef.current += 1;
            
            if (headerClickTimeoutRef.current) {
              clearTimeout(headerClickTimeoutRef.current);
            }
            
            headerClickTimeoutRef.current = setTimeout(() => {
              headerClickCountRef.current = 0;
            }, 1000); // Setzt den Zähler nach 1 Sekunde Pause zurück

            if (headerClickCountRef.current >= 7) {
              setShowEditorMode(prev => {
                const nextMode = !prev;
                alert(nextMode ? 'Geheimer Editor-Modus aktiviert!' : 'Geheimer Editor-Modus deaktiviert.');
                return nextMode;
              });
              headerClickCountRef.current = 0;
            }
          };

          useEffect(() => {
            localStorage.setItem('telli_favorites', JSON.stringify(favorites));
          }, [favorites]);

          useEffect(() => {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
              setIsDarkMode(true);
              document.documentElement.classList.add('dark');
            } else {
              setIsDarkMode(false);
              document.documentElement.classList.remove('dark');
            }
          }, []);

          const toggleDarkMode = () => {
            if (isDarkMode) {
              document.documentElement.classList.remove('dark');
              localStorage.setItem('theme', 'light');
              setIsDarkMode(false);
            } else {
              document.documentElement.classList.add('dark');
              localStorage.setItem('theme', 'dark');
              setIsDarkMode(true);
            }
          };

          useEffect(() => {
            const loadData = async () => {
              try {
                setLoading(true);
                let faecherNamen = [];
                try {
                  const faecherRes = await fetch('faecher.json');
                  if (!faecherRes.ok) throw new Error("faecher.json nicht gefunden");
                  faecherNamen = await faecherRes.json();
                } catch (e) {
                  console.warn("Konnte faecher.json nicht laden, nutze Fallback.", e);
                  setFileError(true);
                  setEntries(FALLBACK_DATA);
                  setFaecherListe(['Deutsch']);
                  setLoading(false);
                  return;
                }

                const formatierteFaecher = faecherNamen.map(f => f.charAt(0).toUpperCase() + f.slice(1));
                setFaecherListe(formatierteFaecher);

                const fetchPromises = faecherNamen.map(async (fach) => {
                  try {
                    const res = await fetch(`${fach}.json`);
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    const formatiertesFach = fach.charAt(0).toUpperCase() + fach.slice(1);
                    return data.map(entry => ({...entry, fach: formatiertesFach}));
                  } catch (err) {
                    console.warn(`Warnung: Datei ${fach}.json konnte nicht geladen werden.`, err);
                    return []; 
                  }
                });
                
                const results = await Promise.all(fetchPromises);
                let allData = results.flat();

                if (allData.length === 0) {
                  setFileError(true);
                  allData = FALLBACK_DATA;
                } else {
                  setFileError(false);
                }
                setEntries(allData);
              } catch (error) {
                console.error("Genereller Fehler beim Laden der Daten:", error);
                setFileError(true);
                setEntries(FALLBACK_DATA);
                setFaecherListe(['Deutsch']);
              } finally {
                setLoading(false);
              }
            };
            loadData();
          }, []);

          useEffect(() => {
            if (entries.length > 0) {
              const params = new URLSearchParams(window.location.search);
              const promptId = params.get('prompt');
              if (promptId) {
                setFilters({ fach: [], stufe: [], funktion: [], tags: [] });
                setSearchTerm('');
                setShowFavoritesOnly(false);
                setShowFilters(false);
                setExpandedCards(prev => new Set(prev).add(promptId));

                setTimeout(() => {
                  const element = document.getElementById(`prompt-${promptId}`);
                  if (element && scrollContainerRef.current) {
                    const containerTop = scrollContainerRef.current.getBoundingClientRect().top;
                    const elementTop = element.getBoundingClientRect().top;
                    const scrollTop = scrollContainerRef.current.scrollTop;
                    scrollContainerRef.current.scrollTo({
                      top: scrollTop + elementTop - containerTop - 100, 
                      behavior: 'smooth'
                    });
                    element.classList.add('ring-4', 'ring-blue-500', 'ring-opacity-50', 'transition-all', 'duration-1000');
                    setTimeout(() => {
                      element.classList.remove('ring-4', 'ring-blue-500', 'ring-opacity-50');
                    }, 2000);
                  }
                }, 300);
              }
            }
          }, [entries.length]);

          useEffect(() => {
            if (entries.length === 0) {
              setAnimatedCount(0);
              return;
            }
            let startTimestamp = null;
            const duration = 2000; 
            const targetCount = entries.length;
            let animationFrameId;

            const easeOutQuart = (x) => 1 - Math.pow(1 - x, 4);

            const step = (timestamp) => {
              if (!startTimestamp) startTimestamp = timestamp;
              const progress = timestamp - startTimestamp;
              const ratio = Math.min(progress / duration, 1);
              const easedRatio = easeOutQuart(ratio);
              setAnimatedCount(Math.round(easedRatio * targetCount));
              if (progress < duration) {
                animationFrameId = window.requestAnimationFrame(step);
              } else {
                setAnimatedCount(targetCount); 
              }
            };
            animationFrameId = window.requestAnimationFrame(step);
            return () => window.cancelAnimationFrame(animationFrameId);
          }, [entries.length]);

          const handleScroll = (e) => {
            if (e.target.scrollTop > 400) {
              setShowScrollTop(true);
            } else {
              setShowScrollTop(false);
            }
          };

          const scrollToTop = () => {
            scrollContainerRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handlePrint = () => { window.print(); };

          const toggleFilter = (category, value) => {
            setFilters(prev => {
              const currentFilters = prev[category];
              if (currentFilters.includes(value)) {
                return { ...prev, [category]: currentFilters.filter(item => item !== value) };
              } else {
                return { ...prev, [category]: [...currentFilters, value] };
              }
            });
          };

          const resetFilters = () => {
            setFilters({ fach: [], stufe: [], funktion: [], tags: [] });
            setSearchTerm('');
            setShowFavoritesOnly(false);
          };

          const toggleFavorite = (e, id) => {
            e.stopPropagation();
            setFavorites(prev => {
              if (prev.includes(id)) {
                return prev.filter(f => f !== id);
              } else {
                return [...prev, id];
              }
            });
          };

          const filteredEntries = useMemo(() => {
            return entries.filter(entry => {
              const matchFach = filters.fach.length === 0 || filters.fach.includes(entry.fach);
              const entryStufen = Array.isArray(entry.stufe) ? entry.stufe : [entry.stufe];
              const matchStufe = filters.stufe.length === 0 || entryStufen.some(s => filters.stufe.includes(s));
              const matchFunktion = filters.funktion.length === 0 || filters.funktion.includes(entry.funktion);
              const entryTags = entry.tags || [];
              const matchTags = filters.tags.length === 0 || entryTags.some(t => filters.tags.includes(t));
              const searchLower = searchTerm.toLowerCase();
              const matchSearch = searchTerm === '' || 
                entry.titel.toLowerCase().includes(searchLower) ||
                entry.kurzbeschreibung.toLowerCase().includes(searchLower) ||
                entry.prompt.toLowerCase().includes(searchLower);
              const matchFavorites = !showFavoritesOnly || favorites.includes(entry.id);
              return matchFach && matchStufe && matchFunktion && matchTags && matchSearch && matchFavorites;
            });
          }, [entries, filters, searchTerm, showFavoritesOnly, favorites]);

          const favoriteEntriesToPrint = useMemo(() => {
            return entries.filter(entry => favorites.includes(entry.id));
          }, [entries, favorites]);

          const toggleCard = (id) => {
            setExpandedCards(prev => {
              const newSet = new Set(prev);
              if (newSet.has(id)) newSet.delete(id);
              else newSet.add(id);
              return newSet;
            });
          };

          const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
              alert("Prompt in die Zwischenablage kopiert!");
            }).catch(err => {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              document.body.appendChild(textArea);
              textArea.select();
              try { document.execCommand('copy'); alert("Prompt in die Zwischenablage kopiert!"); } 
              catch (e) { console.error("Kopieren fehlgeschlagen", e); }
              document.body.removeChild(textArea);
            });
          };

          const hasActiveFilters = filters.fach.length > 0 || filters.stufe.length > 0 || filters.funktion.length > 0 || filters.tags.length > 0 || searchTerm !== '' || showFavoritesOnly;

          return (
            <div className="min-h-screen text-slate-800 dark:text-slate-200 font-sans relative flex overflow-hidden print:h-auto print:overflow-visible print:bg-white print:text-black">
              
              {/* --- HAUPTINHALT --- */}
              <div 
                ref={scrollContainerRef}
                onScroll={handleScroll}
                className="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto print:hidden"
              >
                
                {/* HEADER BEREICH */}
                <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 pt-6 pb-8 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
                  <div className="max-w-5xl mx-auto">
                    
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                      <h1 
                        onClick={handleHeaderClick}
                        className="text-3xl sm:text-4xl font-extrabold text-blue-900 dark:text-blue-400 leading-tight cursor-pointer select-none"
                      >
                        telli in Thüringen
                      </h1>
                      <div className="flex flex-wrap items-center gap-2">
                        <button 
                          onClick={toggleDarkMode}
                          className="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800"
                          title={isDarkMode ? "In den hellen Modus wechseln" : "In den dunklen Modus wechseln"}
                        >
                          {isDarkMode ? <SunIcon className="w-4 h-4 text-amber-400" /> : <MoonIcon className="w-4 h-4 text-blue-600 dark:text-blue-400" />}
                          <span className="hidden sm:inline">{isDarkMode ? 'Hell' : 'Dunkel'}</span>
                        </button>
                        <button 
                          onClick={() => setShowHelp(true)}
                          className="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800"
                        >
                          <HelpIcon className="w-4 h-4 text-blue-600 dark:text-blue-400" />
                          <span className="hidden sm:inline">Hilfe</span>
                        </button>
                        <button 
                          onClick={() => setShowImpressum(true)}
                          className="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800"
                        >
                          <InfoIcon className="w-4 h-4 text-blue-600 dark:text-blue-400" />
                          <span className="hidden sm:inline">Impressum</span>
                        </button>
                      </div>
                    </div>

                    <h2 className="text-lg sm:text-xl text-blue-700 dark:text-blue-300 font-medium mb-8">
                      <span 
                        className="inline-block text-right tabular-nums text-2xl font-black text-emerald-600 dark:text-emerald-400 mr-1" 
                        style={{ minWidth: `${Math.max(1, entries.length.toString().length)}ch` }}
                      >
                        {animatedCount}
                      </span> Praxisbeispiele für den Einsatz von telli im schulischen Kontext
                    </h2>
                    
                    {fileError && (
                      <div className="bg-amber-50 dark:bg-amber-900/30 border-l-4 border-amber-500 p-4 mb-8 text-amber-800 dark:text-amber-200 text-sm">
                        <p className="font-bold">Hinweis zum lokalen Modus</p>
                        <p>Sie haben die Datei lokal ohne Server geöffnet oder die faecher.json fehlt. Aus Sicherheitsgründen blockiert Ihr Browser das Einlesen der Dateien oder sie wurden nicht gefunden. Es werden daher nur die Fallback-Daten angezeigt.</p>
                      </div>
                    )}

                    <div className="relative overflow-hidden bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/30 dark:to-indigo-900/20 rounded-2xl p-6 sm:p-8 border border-blue-200/60 dark:border-blue-800/60 shadow-md mb-8 transition-all duration-300 hover:shadow-lg">
                      <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-400/10 dark:bg-blue-400/5 rounded-full blur-2xl pointer-events-none"></div>
                      <div className="relative z-10 flex flex-col gap-5 text-slate-700 dark:text-slate-300 leading-relaxed">
                        <p className="text-lg">
                          <strong className="font-extrabold text-blue-900 dark:text-blue-300 tracking-wide">telli</strong> ist der DSGVO-konforme KI-Chatbot für Schulen in Thüringen, betrieben vom <a href="https://fwu.de" target="_blank" rel="noopener noreferrer" className="font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 underline underline-offset-4 decoration-blue-300/50 hover:decoration-blue-500 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">fwu</a>.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-3 mt-1">
                          <a href="https://www.schulportal-thueringen.de/digitale_werkzeuge/telli" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <BookOpenIcon className="w-4 h-4" /> telli-Zugang über das Thüringer Schulportal
                          </a>
                          <a href="https://www.schulportal-thueringen.de/digitale_werkzeuge/telli/unterstuetzungsangebot" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-700 text-sm font-medium rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <InfoIcon className="w-4 h-4" /> Unterstützungsangebote für telli durch das ThILLM
                          </a>
                        </div>
                        <div className="mt-2 pt-4 border-t border-blue-200/50 dark:border-blue-800/50">
                          <p className="text-lg">Diese Seite zeigt Einsatzideen für telli für verschiedene Fächer, gegliedert nach telli-Funktionen und Schulstufen. Die Beispiele sind als Anregung zur Erstellung eigener telli-Funktionen gedacht.</p>
                        </div>
                      </div>
                    </div>

                    <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4 flex items-center">
                      <InfoIcon className="w-5 h-5 mr-2 text-blue-600 dark:text-blue-400" /> Diese Funktionen stellt telli bereit:
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-white dark:bg-slate-700/50 p-4 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-200">
                        <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2"><ZapIcon className="w-4 h-4 mr-2" /> Prompts für Lehrkräfte</h4>
                        <p className="text-sm text-slate-600 dark:text-slate-300">Direkte Eingaben an telli für Lehrkräfte. Die Lehrkraft tippt, telli liefert Material, Aufgaben oder Ideen.</p>
                      </div>
                      <div className="bg-white dark:bg-slate-700/50 p-4 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-200">
                        <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2"><ImageIcon className="w-4 h-4 mr-2" /> Bildgenerierung</h4>
                        <p className="text-sm text-slate-600 dark:text-slate-300">telli erzeugt Bilder als Schreibanlass, Visualisierung oder Gegenstand für Medienkritik.</p>
                      </div>
                      <div className="bg-white dark:bg-slate-700/50 p-4 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-200">
                        <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2"><LayersIcon className="w-4 h-4 mr-2" /> Assistenten</h4>
                        <p className="text-sm text-slate-600 dark:text-slate-300">Von Lehrkräften vorkonfigurierte KI-Helfer mit hinterlegtem Fachwissen.</p>
                      </div>
                      <div className="bg-white dark:bg-slate-700/50 p-4 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-200">
                        <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2"><BookOpenIcon className="w-4 h-4 mr-2" /> Lernszenarien</h4>
                        <p className="text-sm text-slate-600 dark:text-slate-300">Von Lehrkräften vorkonfigurierte Lernsettings für Schülerinnen und Schüler.</p>
                      </div>
                      <div className="bg-white dark:bg-slate-700/50 p-4 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-200">
                        <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2"><TagIcon className="w-4 h-4 mr-2" /> Dialogpartner</h4>
                        <p className="text-sm text-slate-600 dark:text-slate-300">Von Lehrkräften vorkonfigurierte virtuelle Personen mit eigenem Charakter. SuS chatten mit einer fiktiven Figur.</p>
                      </div>
                    </div>
                  </div>
                </header>

                {/* STICKY FILTER BEREICH (OPTION 4 - KORRIGIERT) */}
                <div className="sticky top-0 z-20 bg-white/95 dark:bg-slate-800/95 backdrop-blur-sm border-b border-slate-200 dark:border-slate-700 shadow-sm py-3 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
                  <div className="max-w-5xl mx-auto flex flex-col gap-4">
                    
                    {/* IMMER SICHTBAR: Suche, Favoriten & Filter-Reset */}
                    <div className="flex flex-col md:flex-row gap-3 items-center justify-between">
                      <div className="w-full md:w-auto flex flex-col sm:flex-row gap-3">
                        <div className="relative w-full sm:w-80">
                          <div className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                            <SearchIcon />
                          </div>
                          <input 
                            type="text" 
                            className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 text-sm rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 shadow-sm transition-shadow placeholder-slate-400 dark:placeholder-slate-500" 
                            placeholder="Stichwort suchen..." 
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                          />
                        </div>
                        
                        <div className="flex gap-2">
                          {/* Favoriten Toggle Button */}
                          <button
                            onClick={() => setShowFavoritesOnly(!showFavoritesOnly)}
                            className={`flex items-center justify-center gap-2 text-sm px-4 py-2.5 rounded-lg font-medium transition-colors border shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 ${
                              showFavoritesOnly 
                              ? 'bg-amber-100 text-amber-800 border-amber-300 hover:bg-amber-200 dark:bg-amber-900/40 dark:text-amber-300 dark:border-amber-700' 
                              : 'bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700'
                            }`}
                          >
                            <StarIcon className="w-4 h-4" filled={showFavoritesOnly} />
                            <span className="hidden sm:inline">Favoriten</span> {favorites.length > 0 && `(${favorites.length})`}
                          </button>

                          {/* Druck-Button (nur anzeigen wenn es Favoriten gibt) */}
                          {favorites.length > 0 && (
                            <button
                              onClick={handlePrint}
                              className="flex items-center justify-center gap-2 text-sm px-4 py-2.5 rounded-lg font-medium transition-colors border shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700"
                              title="Markierte Favoriten als PDF speichern oder drucken"
                            >
                              <PrinterIcon className="w-4 h-4" />
                              <span className="hidden sm:inline">Favoriten Drucken / PDF</span>
                            </button>
                          )}
                        </div>
                      </div>
                      
                      {hasActiveFilters && (
                        <button 
                          onClick={resetFilters}
                          className="w-full md:w-auto text-sm px-4 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800"
                        >
                          Filter zurücksetzen
                        </button>
                      )}
                    </div>

                    {/* FILTER-KOPFZEILE (Erweiterte Kategorien) */}
                    <div className="flex justify-between items-center border-t border-slate-200 dark:border-slate-700 pt-3">
                      <h3 className="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 flex items-center">
                        Erweiterte Filter (Fach, Funktion, Stufe):
                      </h3>
                      
                      <button 
                        onClick={() => setShowFilters(!showFilters)}
                        className="flex items-center gap-2 text-sm px-3 py-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 rounded-lg transition-colors font-medium border border-slate-200 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        <TagIcon className="w-4 h-4" />
                        {showFilters ? 'Ausblenden' : 'Anzeigen'}
                      </button>
                    </div>

                    {/* EIN-/AUSKLAPPBARER BEREICH (nur noch Kategorien) */}
                    <div className={`${showFilters ? 'flex' : 'hidden'} flex-col gap-4`}>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        
                        {/* Fach Filter */}
                        <div>
                          <div className="flex items-center gap-1 mb-1.5">
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Fach</label>
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {faecherListe.map(opt => {
                              const isActive = filters.fach.includes(opt);
                              return (
                                <button 
                                  key={opt}
                                  onClick={() => toggleFilter('fach', opt)}
                                  className={`inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-medium border transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 ${
                                    isActive 
                                    ? 'bg-emerald-600 text-white border-emerald-700 dark:bg-emerald-500 dark:border-emerald-500 shadow-sm' 
                                    : 'bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800/50 dark:hover:bg-emerald-900/50'
                                  }`}
                                >
                                  <BookOpenIcon className="w-3 h-3" /> {opt}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* Funktion Filter */}
                        <div>
                          <div className="flex items-center gap-1 mb-1.5">
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Funktion</label>
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {FILTER_FUNKTION.map(opt => {
                              const isActive = filters.funktion.includes(opt);
                              return (
                                <button 
                                  key={opt}
                                  onClick={() => toggleFilter('funktion', opt)}
                                  className={`inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-medium border transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 ${
                                    isActive 
                                    ? 'bg-amber-500 text-white border-amber-600 dark:bg-amber-500 dark:border-amber-500 shadow-sm' 
                                    : 'bg-amber-50 text-amber-800 border-amber-200 hover:bg-amber-100 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800/50 dark:hover:bg-amber-900/50'
                                  }`}
                                >
                                  <ZapIcon className="w-3 h-3" /> {opt}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* Stufe Filter */}
                        <div>
                          <div className="flex items-center gap-1 mb-1.5">
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Stufe</label>
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {FILTER_STUFE.map(opt => {
                              const isActive = filters.stufe.includes(opt);
                              return (
                                <button 
                                  key={opt}
                                  onClick={() => toggleFilter('stufe', opt)}
                                  className={`inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-medium border transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 ${
                                    isActive 
                                    ? 'bg-purple-600 text-white border-purple-700 dark:bg-purple-500 dark:border-purple-500 shadow-sm' 
                                    : 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100 dark:bg-purple-900/30 dark:text-purple-300 dark:border-purple-800/50 dark:hover:bg-purple-900/50'
                                  }`}
                                >
                                  <LayersIcon className="w-3 h-3" /> {opt}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* Tags Filter */}
                        <div>
                          <div className="flex items-center gap-1 mb-1.5">
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Tags</label>
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {FILTER_TAGS.map(opt => {
                              const isActive = filters.tags.includes(opt);
                              return (
                                <button 
                                  key={opt}
                                  onClick={() => toggleFilter('tags', opt)}
                                  className={`inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-medium border transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800 ${
                                    isActive 
                                    ? 'bg-rose-500 text-white border-rose-600 dark:bg-rose-500 dark:border-rose-500 shadow-sm' 
                                    : 'bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100 dark:bg-rose-900/30 dark:text-rose-300 dark:border-rose-800/50 dark:hover:bg-rose-900/50'
                                  }`}
                                >
                                  <TagIcon className="w-3 h-3" /> {opt}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                      </div>
                    </div>

                  </div>
                </div>

                {/* CONTENT BEREICH */}
                <main className="flex-1 max-w-5xl w-full mx-auto py-8 px-4 sm:px-6 lg:px-8">
                  {loading ? (
                    <div className="text-center py-12 text-slate-500 dark:text-slate-400">Daten werden geladen...</div>
                  ) : (
                    <>
                      <div className="mb-6 text-sm text-slate-500 dark:text-slate-400 font-medium">
                        Zeige {filteredEntries.length} {filteredEntries.length === 1 ? 'Eintrag' : 'Einträge'}
                      </div>

                      <div className="grid gap-6 mb-12">
                        {filteredEntries.length > 0 ? (
                          filteredEntries.map((entry) => {
                            const isExpanded = expandedCards.has(entry.id);
                            const isFavorite = favorites.includes(entry.id);
                            
                            return (
                              <div id={`prompt-${entry.id}`} key={entry.id} className={`bg-white dark:bg-slate-800 rounded-xl shadow-sm border overflow-hidden transition-all duration-200 hover:shadow-md dark:hover:shadow-slate-900/50 ${isFavorite ? 'border-amber-300 dark:border-amber-700' : 'border-slate-200 dark:border-slate-700'}`}>
                                <div 
                                  className="p-5 cursor-pointer flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center focus:outline-none focus:bg-slate-50 dark:focus:bg-slate-700/50 transition-colors"
                                  onClick={() => toggleCard(entry.id)}
                                  tabIndex="0"
                                  role="button"
                                  aria-expanded={isExpanded}
                                  onKeyDown={(e) => {
                                    if (e.key === 'Enter' || e.key === ' ') {
                                      e.preventDefault();
                                      toggleCard(entry.id);
                                    }
                                  }}
                                >
                                  <div className="flex-1">
                                    <div className="flex items-center gap-3 mb-2">
                                      <span className="bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-300 text-xs font-bold px-2.5 py-0.5 rounded">
                                        #{entry.id}
                                      </span>
                                      <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100">{entry.titel}</h3>
                                    </div>
                                    
                                    <p className="text-slate-600 dark:text-slate-400 text-sm mb-3">
                                      {entry.kurzbeschreibung}
                                    </p>

                                    <div className="flex flex-wrap gap-2">
                                      <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-800/50">
                                        <BookOpenIcon className="w-3 h-3" /> {entry.fach}
                                      </span>
                                      <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-amber-50 dark:bg-amber-900/30 text-amber-800 dark:text-amber-300 border border-amber-200 dark:border-amber-800/50">
                                        <ZapIcon className="w-3 h-3" /> {entry.funktion}
                                      </span>
                                      <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 border border-purple-200 dark:border-purple-800/50">
                                        <LayersIcon className="w-3 h-3" /> {Array.isArray(entry.stufe) ? entry.stufe.join(', ') : entry.stufe}
                                      </span>
                                      
                                      {/* Optionale Tags rendern */}
                                      {(entry.tags || []).map(tag => (
                                        <span key={tag} className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-800/50">
                                          <TagIcon className="w-3 h-3" /> {tag}
                                        </span>
                                      ))}
                                    </div>
                                  </div>
                                  
                                  <div className="flex items-center gap-1 mt-4 sm:mt-0">
                                    {/* QR Code Button */}
                                    <button 
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        const url = `${window.location.origin}${window.location.pathname}?prompt=${entry.id}`;
                                        setQrModal({ isOpen: true, url: url, titel: entry.titel });
                                      }}
                                      className="p-2 text-slate-400 hover:text-blue-600 dark:text-slate-500 dark:hover:text-blue-400 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                                      title="QR-Code anzeigen"
                                    >
                                      <QrCodeIcon className="w-5 h-5" />
                                    </button>

                                    {/* Der Editor-Button */}
                                    {showEditorMode && (
                                      <a 
                                        href={`prompt-editor.html?file=${entry.fach.toLowerCase()}.json&id=${entry.id}`}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="p-2 text-slate-400 hover:text-blue-600 dark:text-slate-500 dark:hover:text-blue-400 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                                        title="Im Editor bearbeiten"
                                        onClick={(e) => e.stopPropagation()}
                                      >
                                        <EditIcon className="w-5 h-5" />
                                      </a>
                                    )}
                                    
                                    {/* Favoriten Button */}
                                    <button 
                                      onClick={(e) => toggleFavorite(e, entry.id)}
                                      className={`p-2 transition-colors rounded focus:outline-none focus:ring-2 focus:ring-amber-500 ${isFavorite ? 'text-amber-500 hover:text-amber-600' : 'text-slate-300 dark:text-slate-600 hover:text-amber-400'}`}
                                      title={isFavorite ? "Aus Favoriten entfernen" : "Zu Favoriten hinzufügen"}
                                    >
                                      <StarIcon className="w-6 h-6" filled={isFavorite} />
                                    </button>

                                    {/* Der normale Aufklapp-Pfeil */}
                                    <div className="flex items-center justify-center p-2 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400">
                                      {isExpanded ? <ChevronUpIcon /> : <ChevronDownIcon />}
                                    </div>
                                  </div>
                                </div>

                                {isExpanded && (
                                  <div className="border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-5">
                                    <div className="flex justify-between items-center mb-3">
                                      <h4 className="text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider">Prompt / Eingabe</h4>
                                      <button 
                                        onClick={(e) => {
                                          e.stopPropagation();
                                          copyToClipboard(entry.prompt);
                                        }}
                                        className="text-xs bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium py-1 px-3 rounded shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500"
                                      >
                                        Kopieren
                                      </button>
                                    </div>
                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-4 font-mono text-sm text-slate-800 dark:text-slate-300 whitespace-pre-wrap leading-relaxed">
                                      {entry.prompt}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })
                        ) : (
                          <div className="text-center py-12 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                            <p className="text-slate-500 dark:text-slate-400">Keine Einträge für diese Filter gefunden.</p>
                          </div>
                        )}
                      </div>
                    </>
                  )}
                </main>

                {/* FOOTER BEREICH */}
                <footer className="mt-auto bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 py-6 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
                  <div className="max-w-5xl mx-auto flex flex-col items-center justify-center gap-3 text-sm text-slate-500 dark:text-slate-400 text-center">
                    
                    <div className="font-medium">
                      Erstellt 2026 von Tobias Lochner, Dr. Sulzberger-Gymnasium Bad Salzungen
                    </div>
                    
                    <div>
                      <span>Dieses Werk ist lizenziert unter einer </span>
                      <a 
                        href="https://creativecommons.org/licenses/by/4.0/deed.de" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="text-blue-600 dark:text-blue-400 hover:underline font-medium inline-flex items-center gap-1 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                      >
                        Creative Commons Namensnennung 4.0 International Lizenz
                      </a>.
                    </div>

                    <div className="mt-1 flex flex-wrap justify-center gap-3">
                      <button 
                        onClick={() => setShowHelp(true)}
                        className="text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 transition-colors font-medium flex items-center justify-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded px-3 py-1 bg-slate-100 dark:bg-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700"
                      >
                        <HelpIcon className="w-4 h-4" />
                        Hilfe
                      </button>
                      <button 
                        onClick={() => setShowImpressum(true)}
                        className="text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 transition-colors font-medium flex items-center justify-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded px-3 py-1 bg-slate-100 dark:bg-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700"
                      >
                        <InfoIcon className="w-4 h-4" />
                        Impressum
                      </button>
                    </div>

                  </div>
                </footer>
              </div>

              {/* === DRUCK-ANSICHT (Wird nur auf dem Drucker / im PDF angezeigt) === */}
              <div className="hidden print:block w-full max-w-4xl mx-auto p-8 bg-white text-black font-sans">
                <div className="mb-10 border-b-2 border-slate-800 pb-4">
                  <h1 className="text-4xl font-extrabold text-slate-900 mb-2">Meine telli Favoriten</h1>
                  <p className="text-lg text-slate-600">telli in Thüringen – https://lochnertobias.github.io/telli-in-thueringen/</p>
                </div>

                {favoriteEntriesToPrint.length === 0 ? (
                  <p>Es wurden keine Favoriten markiert.</p>
                ) : (
                  <div className="space-y-8">
                    {favoriteEntriesToPrint.map((entry) => {
                      // Dynamischer Link für den QR Code im Druck
                      const qrUrl = `${window.location.origin}${window.location.pathname}?prompt=${entry.id}`;
                      
                      return (
                        <div key={entry.id} className="break-inside-avoid border border-slate-300 rounded-lg p-6">
                          <div className="flex justify-between items-start gap-4 mb-4">
                            <div>
                              <div className="flex items-center gap-3 mb-3">
                                <span className="bg-slate-200 text-slate-800 text-xs font-bold px-2 py-1 rounded">
                                  #{entry.id}
                                </span>
                                <h2 className="text-xl font-bold text-slate-900">{entry.titel}</h2>
                              </div>
                              
                              <div className="flex flex-wrap gap-2 text-sm">
                                <span className="font-semibold">{entry.fach}</span>
                                <span className="text-slate-400">•</span>
                                <span>{entry.funktion}</span>
                                <span className="text-slate-400">•</span>
                                <span>{Array.isArray(entry.stufe) ? entry.stufe.join(', ') : entry.stufe}</span>
                              </div>
                            </div>

                            {/* Der QR-Code für den Ausdruck */}
                            <div className="flex flex-col items-center flex-shrink-0">
                              <img 
                                src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(qrUrl)}`} 
                                alt="QR Code" 
                                className="w-20 h-20 border border-slate-200 p-1" 
                              />
                              <span className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Direktlink</span>
                            </div>
                          </div>
                          
                          <p className="text-slate-700 italic mb-4">
                            {entry.kurzbeschreibung}
                          </p>
                          
                          <div className="mt-4">
                            <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-2">Prompt / Eingabe:</h3>
                            <div className="bg-slate-50 border border-slate-200 rounded p-4 font-mono text-sm text-slate-900 whitespace-pre-wrap">
                              {entry.prompt}
                            </div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                )}
                <div className="mt-12 pt-4 border-t border-slate-300 text-center text-xs text-slate-500">
                  Gedruckt am: {new Date().toLocaleDateString('de-DE')}
                </div>
              </div>

              {/* MODALS */}
              
              {/* QR Code Modal */}
              {qrModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 z-50 flex items-center justify-center p-4 print:hidden" onClick={() => setQrModal({ isOpen: false, url: '', titel: '' })}>
                  <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl max-w-lg w-full p-6 text-center" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold text-slate-900 dark:text-slate-100 truncate pr-4">{qrModal.titel}</h3>
                      <button onClick={() => setQrModal({ isOpen: false, url: '', titel: '' })} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"><CloseIcon className="w-6 h-6"/></button>
                    </div>
                    
                    <div className="flex justify-center bg-white p-4 rounded-lg border border-slate-200 dark:border-slate-700 mb-4">
                      <img src={`https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(qrModal.url)}`} alt="QR Code" className="w-96 h-96" />
                    </div>
                    
                    <div className="mb-6 flex flex-col items-center gap-3">
                      <p className="text-sm text-slate-500 dark:text-slate-400 break-all">
                        {qrModal.url}
                      </p>
                      
                      <button 
                        onClick={() => {
                          navigator.clipboard.writeText(qrModal.url).then(() => {
                            alert("Direktlink in die Zwischenablage kopiert!");
                          }).catch(err => {
                            console.error("Kopieren fehlgeschlagen", err);
                            alert("Fehler beim Kopieren des Links.");
                          });
                        }}
                        className="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 hover:bg-blue-100 dark:hover:bg-blue-900/50 rounded-lg border border-blue-200 dark:border-blue-800/50 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        <LinkIcon className="w-4 h-4" />
                        Direktlink kopieren
                      </button>
                    </div>

                    <button onClick={() => setQrModal({ isOpen: false, url: '', titel: '' })} className="w-full px-4 py-2 text-sm font-medium bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Schließen</button>
                  </div>
                </div>
              )}

              {/* Hilfe Modal */}
              {showHelp && (
                <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 z-50 flex items-center justify-center p-4 print:hidden" onClick={() => setShowHelp(false)}>
                  <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold text-slate-900 dark:text-slate-100">Hilfe & Anleitung</h3>
                      <button onClick={() => setShowHelp(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"><CloseIcon className="w-6 h-6"/></button>
                    </div>
                    <div className="text-sm text-slate-700 dark:text-slate-300 space-y-4">
                      <p>Willkommen auf der Übersichtsseite für Praxisbeispiele zum KI-Chatbot <strong>telli</strong>. Diese Seite hilft Ihnen dabei, vorgefertigte Eingaben (Prompts), Lernszenarien und Assistenten für Ihren Unterricht zu finden, zu organisieren und zu teilen.</p>

                      <h4 className="font-bold text-slate-900 dark:text-slate-100 text-base mt-6 border-b border-slate-200 dark:border-slate-700 pb-1">🔍 Suchen und Finden</h4>
                      <ul className="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>Stichwortsuche:</strong> Nutzen Sie das Suchfeld oben links, um gezielt nach Begriffen, Themen oder Fächern in den Titeln und Beschreibungen der Beispiele zu suchen.</li>
                        <li><strong>Erweiterte Filter:</strong> Klappen Sie die Filter ("Anzeigen") auf, um die Ergebnisse gezielt einzugrenzen. Sie können nach <strong>Fach</strong>, <strong>Funktion</strong> (z. B. Bildgenerierung, Assistent), <strong>Schulstufe</strong> und <strong>Tags</strong> filtern. Klicken Sie auf einen Filter, um ihn zu aktivieren oder wieder zu deaktivieren.</li>
                        <li><strong>Filter zurücksetzen:</strong> Sobald Sie Filter oder eine Suche aktiv haben, erscheint ein Button „Filter zurücksetzen“, mit dem Sie sofort wieder alle Einträge sehen.</li>
                      </ul>

                      <h4 className="font-bold text-slate-900 dark:text-slate-100 text-base mt-6 border-b border-slate-200 dark:border-slate-700 pb-1">💡 Einträge ansehen und kopieren</h4>
                      <ul className="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>Aufklappen:</strong> Klicken Sie auf einen beliebigen Eintrag (die "Karte"), um ihn aufzuklappen und den vollständigen Text (den eigentlichen Prompt) zu lesen.</li>
                        <li><strong>In die Zwischenablage kopieren:</strong> Im aufgeklappten Bereich finden Sie rechts den Button „Kopieren“. Damit wird der Text direkt in Ihre Zwischenablage gespeichert, sodass Sie ihn bequem in telli einfügen können.</li>
                      </ul>

                      <h4 className="font-bold text-slate-900 dark:text-slate-100 text-base mt-6 border-b border-slate-200 dark:border-slate-700 pb-1">⭐ Favoriten & Druckfunktion</h4>
                      <ul className="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>Favoriten markieren:</strong> Klicken Sie auf das Stern-Symbol an einem Eintrag, um ihn sich als Favorit zu merken.</li>
                        <li><strong>Nur Favoriten anzeigen:</strong> Klicken Sie oben im Menü auf den Button „Favoriten“, um alle anderen Einträge auszublenden und nur Ihre gemerkten Beispiele zu sehen.</li>
                        <li><strong>Drucken / als PDF speichern:</strong> Sobald Sie mindestens einen Favoriten markiert haben, erscheint oben der Button „Favoriten Drucken / PDF“. Damit wird eine saubere, druckoptimierte Ansicht generiert, die nur Ihre ausgewählten Einträge (inklusive praktischer QR-Codes) enthält.</li>
                      </ul>

                      <h4 className="font-bold text-slate-900 dark:text-slate-100 text-base mt-6 border-b border-slate-200 dark:border-slate-700 pb-1">🔗 Teilen und Verlinken</h4>
                      <ul className="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>QR-Code und Direktlink:</strong> Klicken Sie auf das kleine QR-Code-Symbol an einem Eintrag. Es öffnet sich ein Fenster mit einem vergrößerten QR-Code (ideal zum Zeigen über den Beamer) und einem Direktlink.</li>
                        <li><strong>Link kopieren:</strong> Im selben Fenster finden Sie die Schaltfläche „Direktlink kopieren“, um den Link schnell an Kolleginnen und Kollegen weiterzuleiten.</li>
                      </ul>

                      <h4 className="font-bold text-slate-900 dark:text-slate-100 text-base mt-6 border-b border-slate-200 dark:border-slate-700 pb-1">🌙 Darstellung</h4>
                      <ul className="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>Hell/Dunkel-Modus:</strong> Oben rechts finden Sie einen Schalter, um das Aussehen der Seite jederzeit zwischen einem hellen und einem augenschonenden dunklen Design ("Darkmode") zu wechseln.</li>
                      </ul>
                    </div>
                    <div className="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                      <button onClick={() => setShowHelp(false)} className="px-4 py-2 text-sm font-medium bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Schließen</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Impressum Modal */}
              {showImpressum && (
                <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 z-50 flex items-center justify-center p-4 print:hidden" onClick={() => setShowImpressum(false)}>
                  <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl max-w-lg w-full p-6" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold text-slate-900 dark:text-slate-100">Impressum</h3>
                      <button onClick={() => setShowImpressum(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"><CloseIcon className="w-6 h-6"/></button>
                    </div>
                    <div className="text-sm text-slate-700 dark:text-slate-300 space-y-4">
                      
                      <p><strong className="dark:text-slate-200">telli in Thüringen</strong></p>
                      <p>erstellt von Tobias Lochner, <br/>Dr. Sulzberger-Gymnasium, Bad Salzungen, 2026</p>
                      <p>basierend auf einer Idee von <br/> Martin Kurz, Hessische Lehrkräfteakademie, 2026, <a href="https://mgkurz.github.io/-telli-deutsch-ideen/" target="_blank" rel="noopener noreferrer" className="text-blue-600 dark:text-blue-400 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"> https://mgkurz.github.io/-telli-deutsch-ideen/
                        </a>
                      </p>
                      
                      <div className="pt-2">
                        <strong className="text-slate-900 dark:text-slate-200">Ergänzte Funktionen:</strong>
                        <ul className="list-disc pl-5 mt-2 space-y-1">
						  <li>Trennung von Prompt-"Datenbank" und Anzeige </li>
						  <li>Promptssammlung in json-Dateien ausgelagert (1x json-Datei / Fach)</li>
                          <li>Erweiterung der Prompts um die Filterebenen "Fächer" und "Tags"</li>
                          <li>dynamisches Einlesen der Fächer via Inhaltsverzeichnis (faecher.json)</li>
						  <li>dynamisches Einlesen der Tags via Inhaltsverzeichnis (tags.json)</li>
                          <li>Darkmode ergänzt</li>
						  <li>"Scroll-to-Top"-Button ergänzt</li>
						  <li>Favoritensystem ergänzt</li>
						  <li>Funktion, um Favoriten auszudrucken / als PDF zu speichern, ergänzt</li>
						  <li>direkte Verlinkung per QR-Code oder per "Link kopieren" ergänzt</li>
						  <li>QR-Codes beim Ausdrucken ergänzt</li>
                          <li>thüringenspezifische Anpassungen</li>
                        </ul>
                      </div>
                      
                      {/* NEUER GITHUB LINK BLOCK */}
                      <div className="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700">
                        <p>
                          <strong className="text-slate-900 dark:text-slate-200">Quellcode (GitHub):</strong><br/>
                          <a 
                            href="https://github.com/lochnertobias/telli-in-thueringen" 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="text-blue-600 dark:text-blue-400 hover:underline font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 rounded break-all"
                          >
                            https://github.com/lochnertobias/telli-in-thueringen
                          </a>
                        </p>
                      </div>

                      {/* CC BY 4.0 Hinweis im Modal */}
                      <div className="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700">
                        <p>
                          Dieses Werk ist lizenziert unter einer <br/>
                          <a 
                            href="https://creativecommons.org/licenses/by/4.0/deed.de" 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="text-blue-600 dark:text-blue-400 hover:underline font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                          >
                            Creative Commons Namensnennung 4.0 International Lizenz (CC BY 4.0)
                          </a>.
                        </p>
                      </div>

                    </div>
                    <div className="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                      <button onClick={() => setShowImpressum(false)} className="px-4 py-2 text-sm font-medium bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Schließen</button>
                    </div>
                  </div>
                </div>
              )}

              {/* SCROLL TO TOP BUTTON */}
              {showScrollTop && (
                <button
                  onClick={scrollToTop}
                  className="fixed bottom-6 right-6 p-3 bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white rounded-full shadow-lg transition-all duration-300 z-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 dark:focus:ring-offset-slate-900 animate-fade-in print:hidden"
                  aria-label="Nach oben scrollen"
                  title="Nach oben scrollen"
                >
                  <ArrowUpIcon className="w-6 h-6" />
                </button>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      /* Verhindert, dass Web-Apps mit Scroll-Containern nur die 1. Seite drucken */
      @media print {
        body, html, #root {
          height: auto !important;
          overflow: visible !important;
          background-color: white !important;
        }
      }
    </style>
</body>
</html>
